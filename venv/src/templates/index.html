<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budgeting Software</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/text_styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/component_styles.css') }}"
    />
  </head>
  <body>
    <div class="main">
      <div class="side-bar">
        <div class="side-bar-buttons">
          <button class="button filled">Edit transaction data</button>
        </div>
        <hr />
      </div>
      <div class="info-panel">
        <div class="top-bar">
          <h1 id="page-title"></h1>
          <a href="https://www.hsbc.co.uk" target="_blank" class="link">Bank</a>
        </div>
        <div class="info-content">
          <div class="quick-info-panel">
            <div class="card quick-info">
              <div>
                <h2 class="muted">Total Budget</h2>
                <p class="large" id="quick-info-budget"></p>
              </div>
              <span
                class="small badge neutral"
                id="quick-info-budget-daily"
              ></span>
            </div>
            <div class="card quick-info">
              <div>
                <h2 class="muted">Money Remaining</h2>
                <p class="large" id="quick-info-remaining"></p>
              </div>
              <span
                class="small badge neutral"
                id="quick-info-remaining-daily"
              ></span>
            </div>
            <div class="card quick-info">
              <div>
                <h2 class="muted">Total Income</h2>
                <p class="large" id="quick-info-income"></p>
              </div>
            </div>
            <div class="card quick-info">
              <div>
                <h2 class="muted">Total Spending</h2>
                <p class="large" id="quick-info-spending"></p>
              </div>
              <span
                class="small badge neutral"
                id="quick-info-spending-daily"
              ></span>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-header-text">
                <h2 class="title">Spending Graph</h2>
                <p class="muted">Cumulative spending for this month.</p>
              </div>
            </div>
            <div class="graph-wrapper">
              <canvas id="monthly-spend-graph"></canvas>
            </div>
          </div>
          <div class="info-columns">
            <div class="info-left">
              <div class="card">
                <div class="card-header">
                  <div class="card-header-text">
                    <h2 class="title">Budget</h2>
                    <p class="muted">
                      Summary of spending and budget for categorised transactions.
                    </p>
                  </div>
                </div>
                <div class="table-wrapper">
                  <table id="budget-table"></table>
                </div>
                <div class="budget-controls">
                  <button class="button outline">Edit aliases</button>
                  <button class="button outline">Edit categories</button>
                </div>
              </div>
              <div id="category-transactions"></div>
            </div>
            <div class="info-right" id="daily-transactions"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='scripts/utils.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/sidebar.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/top_bar.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/quick_info.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/graph.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/budget.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/daily_transactions.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/category_transactions.js') }}"></script>
  <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
</html>
