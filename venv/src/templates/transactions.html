<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budgeting Software | Transactions</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/text_styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/component_styles.css') }}"
    />
  </head>
  <body class="config-page">
    <div class="config-head">
      <a href="{{ url_for('home') }}" class="link return muted">Home</a>
      <h1>Edit transaction data</h1>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-header-text">
          <h2 class="title">Data sources</h2>
          <p class="muted">
            All the files from which transaction data is drawn from
          </p>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <tr>
            <th>File name</th>
            <th>Start</th>
            <th>End</th>
            <th>Remove</th>
          </tr>
        </table>
      </div>
      <div class="card-buttons">
        <button class="button filled">Add data source</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-header-text">
          <h2 class="title">Transactions</h2>
          <p class="muted">
            View and edit all transactions drawn from data sources
          </p>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <tr>
            <th>Counterparty</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Alias</th>
          </tr>
        </table>
      </div>
    </div>
    <script src="{{ url_for('static', filename='scripts/utils.js') }}"></script>
  </body>
</html>
